name: Bug
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Remove secrets and real dataset rows.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit SHA
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs, trace IDs, or screenshots
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 - security or data loss
        - P1 - critical workflow blocked
        - P2 - degraded with workaround
        - P3 - minor
    validations:
      required: true
